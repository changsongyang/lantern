name: Build Android

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      build_type:
        required: true
        type: string
      installer_base_name:
        required: true
        type: string

jobs:
  build-android:
    permissions:
      contents: "read"
      id-token: "write"
    env:
      BUILD_TYPE: ${{ inputs.build_type }}
      VERSION: ${{ inputs.version }}
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download pubspec.yaml
        uses: actions/download-artifact@v4
        with:
          name: pubspec

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        timeout-minutes: 5
        continue-on-error: true
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        timeout-minutes: 10
        continue-on-error: true
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-    

      - name: Set up Java 17 (Gradle cache)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: "gradle"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euxo pipefail
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"
          yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses >/dev/null || true

          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"
          for var in ANDROID_NDK_HOME ANDROID_NDK_ROOT NDK_HOME; do
            echo "${var}=${ANDROID_SDK_ROOT}/ndk/27.0.12077973" >> "$GITHUB_ENV"
          done

      - name: Install Flutter
        uses: subosito/flutter-action@v2.22.0
        with:
          channel: stable
          flutter-version-file: .github/flutter-version.yaml
          cache: true

      - name: Cache Dart pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-dart-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-dart-

      - name: Set gradle properties
        env:
          GRADLE_PROPERTIES: ${{ secrets.GRADLE_PROPERTIES }}
        run: |
          mkdir -p ~/.gradle/
          echo "GRADLE_USER_HOME=${HOME}/.gradle" >> $GITHUB_ENV
          echo "${GRADLE_PROPERTIES}" > ~/.gradle/gradle.properties

      - name: Decode APP_ENV
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: "app.env"
          fileDir: ${{ github.workspace }}
          encodedString: ${{ secrets.APP_ENV }}

      - name: Decode Keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: "keystore.release.jks"
          fileDir: "./android/app"
          encodedString: ${{ secrets.KEYSTORE }}

      - name: Set gomobile cache dir
        shell: bash
        run: |
          echo "GOMOBILECACHE=$HOME/.cache/gomobile" >> "$GITHUB_ENV"
          mkdir -p "$HOME/.cache/gomobile"

      - name: Cache gomobile
        uses: actions/cache@v4
        timeout-minutes: 10
        continue-on-error: true
        with:
          path: ~/.cache/gomobile
          key: ${{ runner.os }}-gomobile-${{ hashFiles('**/go.mod', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-gomobile-

      - name: Install dependencies (gomobile)
        run: |
          make install-android-deps
        env:
          GOMOBILECACHE: ${{ env.GOMOBILECACHE }}

      - name: Build Android (APK + AAB)
        run: make android-release-ci
        env:
          BUILD_TYPE: ${{ inputs.build_type }}
          VERSION: ${{ inputs.version }}
          INSTALLER_NAME: ${{ inputs.installer_base_name }}
          GOMOBILECACHE: ${{ env.GOMOBILECACHE }}

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: lantern-installer-apk
          path: ${{ inputs.installer_base_name }}${{ inputs.build_type != 'production' && format('-{0}', inputs.build_type) || '' }}.apk
          retention-days: 2

      - name: Upload Android AAB
        uses: actions/upload-artifact@v4
        with:
          name: lantern-installer-aab
          path: ${{ inputs.installer_base_name }}${{ inputs.build_type != 'production' && format('-{0}', inputs.build_type) || '' }}.aab
          retention-days: 2

      - name: Upload mapping.txt
        uses: actions/upload-artifact@v4
        with:
          name: play-mapping
          path: mapping.txt
          retention-days: 7

      - name: Upload native debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: play-debug-symbols
          path: debug-symbols.zip
          retention-days: 7
