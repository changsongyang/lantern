plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def hasRelProp = { name -> project.hasProperty(name) && project.property(name)?.toString()?.trim() }
def hasReleaseKeystore =
        hasRelProp('KEYSTORE_FILE') &&
        hasRelProp('KEYSTORE_PWD') &&
        hasRelProp('KEY_ALIAS') &&
        hasRelProp('KEY_PWD')

def start = new Date(2015, 1, 1).getTime()
def now = System.currentTimeMillis()
def code = (int)((now - start) / 1000)

android {
    namespace = "org.getlantern.lantern"
    compileSdk = 36
    ndkVersion "28.2.13676358"

    sourceSets {
        main {
            jniLibs.srcDirs = ['libs']
            jniLibs.srcDirs += ['src/main/jniLibs']
        }
    }

    externalNativeBuild {
        cmake {
            path "cpp/CMakeLists.txt"
        }
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    // Use legacy packaging to helps reduce apk size
    packagingOptions {
        exclude "DebugProbesKt.bin"
        jniLibs {
            useLegacyPackaging true
        }
    }

    defaultConfig {
        applicationId = "org.getlantern.lantern"
        minSdkVersion = 24
        targetSdk = 36
        versionCode = code
        versionName = flutter.versionName

        ndk {
            // Must match the ABIs Flutter actually builds (ANDROID_TARGET_PLATFORMS
            // in the top-level Makefile: android-arm + android-arm64). Listing an
            // ABI here that Flutter didn't build for produces an empty per-ABI
            // split on Play and crashes installs on that architecture with
            // "Could not find 'libflutter.so'".
            abiFilters = ["arm64-v8a", "armeabi-v7a"]
            debugSymbolLevel 'FULL'
        }

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++14 -fexceptions -frtti"
                arguments "-DANDROID_ARM_NEON=TRUE", '-DANDROID_STL=c++_shared'
            }
        }
        buildFeatures {
            buildConfig true
        }
    }

    signingConfigs {
        if (hasReleaseKeystore) {
            release {
                storeFile file(project.property('KEYSTORE_FILE'))
                storePassword project.property('KEYSTORE_PWD')
                keyAlias project.property('KEY_ALIAS')
                keyPassword project.property('KEY_PWD')
            }
        }
    }

    buildTypes {
        debug {
            minifyEnabled false
            shrinkResources false
            debuggable true
            signingConfig signingConfigs.debug
            buildConfigField "boolean", "DEVELOPMENT_MODE", "true"
        }

        release {
            minifyEnabled true
            shrinkResources true
            if (hasReleaseKeystore) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
            buildConfigField "boolean", "DEVELOPMENT_MODE", "false"
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

}

flutter {
    source = "../.."
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar', '*.aar'])
    implementation fileTree(dir: "libs", include: "liblantern.aar")
    implementation 'androidx.core:core-ktx:1.15.0'
    implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.8.7'
    implementation 'androidx.work:work-runtime-ktx:2.10.0'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
}
